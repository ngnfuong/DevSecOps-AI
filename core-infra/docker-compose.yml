version: '3.8'

services:
  # --- 1. POSTGRESQL (Database cho SonarQube) ---
  postgres_sonar:
    image: postgres:15-alpine
    container_name: postgres_sonar
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_password
      POSTGRES_DB: sonarqube
    volumes:
      - postgres_sonar_data:/var/lib/postgresql/data
    networks:
      - devsecops_net
    restart: unless-stopped

  # --- 2. SONARQUBE (Công cụ quét SAST) ---
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    depends_on:
      - postgres_sonar
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres_sonar:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_password
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - devsecops_net
    restart: unless-stopped

  # --- 3. ONEDEV (SCM & Điều phối CI/CD) ---
  onedev:
    image: 1dev/server:latest
    container_name: onedev
    # Port 6610/6611 bi Windows reserve (Hyper-V exclusion range 6566-6665).
    # Doi host port sang 7670/7671; container van giu 6610/6611 ben trong.
    ports:
      - "7670:6610"
      - "7671:6611" # Port cho SSH Git
    volumes:
      - onedev_data:/opt/onedev
      # Mount Docker socket để OneDev có thể chạy các container khác trong Pipeline (Trivy, Syft)
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devsecops_net
    restart: unless-stopped

  # --- 4. HASHICORP VAULT (Zero Trust Secret Management - Layer 1) ---
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev_root_token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - devsecops_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- 5. FLOCI — AWS Local Emulator (Zero Trust - Layer 2: AWS Secrets Manager) ---
  # Thay thế miễn phí cho LocalStack (đã ngừng community edition 3/2026)
  # Giả lập 33 AWS services: Secrets Manager, S3, SQS, DynamoDB, Lambda...
  # Pipeline gọi boto3 → Floci (localhost:4566) như gọi AWS thật
  floci:
    image: hectorvent/floci:latest
    container_name: floci
    ports:
      - "4566:4566"
    environment:
      FLOCI_STORAGE_MODE: "persistent"
      FLOCI_STORAGE_PERSISTENT_PATH: "/app/data"
      FLOCI_DEFAULT_REGION: "ap-southeast-1"   # Singapore — gần VN nhất
      FLOCI_DEFAULT_ACCOUNT_ID: "000000000000"
    volumes:
      - floci_data:/app/data
    networks:
      - devsecops_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_floci/health"]
      interval: 15s
      timeout: 10s
      retries: 5


  # --- 6. OWASP ZAP (DAST — Dynamic Application Security Testing) ---
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: owasp_zap
    ports:
      - "8090:8090"
    command: zap.sh -daemon -host 0.0.0.0 -port 8090 -config api.key=zap_api_key_2026 -config connection.timeoutInSecs=60 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
    networks:
      - devsecops_net
    restart: unless-stopped

  # --- 7. KEYCLOAK (IAM — Identity & Access Management) ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Admin@2026
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    networks:
      - devsecops_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 30s
      timeout: 10s
      retries: 10

  # --- 8. VULNERABLE SPRING BOOT APP (DAST Target) ---
  vulnerable-app:
    build:
      context: ../vulnerable-spring-boot
      dockerfile: Dockerfile
    container_name: vulnerable_app
    ports:
      - "8081:8081"
    networks:
      - devsecops_net
    restart: unless-stopped

networks:
  devsecops_net:
    name: devsecops_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.1.0/24   # Dải IP cố định — tránh xung đột khi đổi mạng WiFi

volumes:
  postgres_sonar_data:
  sonarqube_data:
  sonarqube_extensions:
  onedev_data:
  floci_data:    # Persistent storage cho AWS Secrets Manager data